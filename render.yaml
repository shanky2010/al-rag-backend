services:
  - type: web
    name: industrial-rag-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: rag-storage
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: USE_OLLAMA
        value: "false"
      - key: DATA_DIR
        value: "/data"
      - key: RENDER_EXTERNAL_URL
        value: "https://al-rag-backend.onrender.com"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
